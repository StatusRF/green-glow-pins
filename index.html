<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🌿 Green &amp; Glow Pin Generator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAF6EE;font-family:'Lato',system-ui,sans-serif}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    input:focus,textarea:focus{border-color:#1B4D2E!important;box-shadow:0 0 0 3px rgba(27,77,46,0.1);outline:none}
    textarea{font-family:'Lato',system-ui,sans-serif;resize:vertical}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#C7D9CA;border-radius:3px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const G="#1B4D2E",GOLD="#C9960C",CREAM="#FAF6EE",DARK="#111A14",MUTED="#6B7F6E";
const MAX_IMGS=4;
const AFF_TAG="greenandglow-20";

const STYLES=[
  {label:"Natural Earthy Flatlay",   scene:"warm terracotta surface, linen fabric, raw wood boards, soft natural light from the side"},
  {label:"Clean White Minimal",      scene:"bright white marble surface, airy studio light, clean minimal composition, soft shadows"},
  {label:"Dark Moody Premium",       scene:"deep charcoal stone surface, dramatic side lighting, rich dark tones, cinematic shadow play"},
  {label:"Warm Lifestyle In-Use",    scene:"golden hour light, warm hands holding or using the product, blurred cozy home background"},
  {label:"Bright Botanical",         scene:"surrounded by fresh tropical leaves and botanicals, vivid greens, bright natural light"},
  {label:"Rustic Wooden Shelf",      scene:"natural wooden shelf, warm ambient indoor light, earthy props, soft bokeh background"},
  {label:"Soft Pastel Dreamy",       scene:"blush pink and sage green tones, hazy soft-focus background, delicate floral accents"},
  {label:"Outdoor Nature Immersive", scene:"garden setting, dappled sunlight through leaves, natural ground texture, fresh outdoors feel"},
  {label:"Ingredient Macro",         scene:"surrounded by its key raw ingredients or materials, textured close-up, strong macro lighting"},
  {label:"Deep Luxury Night",        scene:"warm amber candlelight, rich dark velvet or polished marble surface, luxury evening mood"}
];

// ── Board matching — never trust GPT for IDs, always match by name ───────────

function matchBoard(boardName, boards) {
  if (!boardName || !boards.length) return null;
  const name = boardName.toLowerCase().trim();
  // 1. Exact match
  let found = boards.find(b => b.name.toLowerCase().trim() === name);
  if (found) return found;
  // 2. Board name contains GPT suggestion
  found = boards.find(b => b.name.toLowerCase().includes(name));
  if (found) return found;
  // 3. GPT suggestion contains board name
  found = boards.find(b => name.includes(b.name.toLowerCase()));
  return found || null;
}

// ── URL helpers ──────────────────────────────────────────────────────────────

function parseAmazonName(url){
  try{
    const m=url.match(/amazon\.[a-z.]+\/([A-Za-z0-9][A-Za-z0-9-]{3,})\/dp\//i);
    if(!m||!m[1])return null;
    return m[1].replace(/-+/g," ").replace(/\b\w/g,c=>c.toUpperCase()).trim();
  }catch(e){return null;}
}

function ensureAffTag(url){
  if(!url)return"";
  if(url.includes("tag="+AFF_TAG))return url;
  const base=url.replace(/[?&]tag=[^&]*/g,"").replace(/[?&]linkCode=[^&]*/g,"").replace(/[?&]$/,"");
  const sep=base.includes("?")?"&":"?";
  return base+sep+"tag="+AFF_TAG+"&linkCode=ll2&language=en_US&ref_=as_li_ss_tl";
}

function slugFromName(name){
  return name.toLowerCase()
    .replace(/[^a-z0-9\s]/g,"").replace(/\s+/g,"-").replace(/-+/g,"-").slice(0,50);
}

// ── API helpers ──────────────────────────────────────────────────────────────

function b64ToBlob(b64,mime){
  const by=atob(b64),a=new Uint8Array(by.length);
  for(let i=0;i<by.length;i++)a[i]=by.charCodeAt(i);
  return new Blob([a],{type:mime});
}

async function autoDetect(images,amazonUrl,oaiKey){
  const urlCtx=amazonUrl?`Amazon product URL: ${amazonUrl}\nUse this to accurately identify the exact product name.\n`:"";
  const imgContent=images.slice(0,2).map(img=>({
    type:"image_url",
    image_url:{url:`data:${img.mime};base64,${img.b64}`,detail:"low"}
  }));
  const r=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+oaiKey},
    body:JSON.stringify({
      model:"gpt-4o-mini",max_tokens:250,
      messages:[{role:"user",content:[
        ...imgContent,
        {type:"text",text:`${urlCtx}Analyze this product. Return ONLY this JSON (no markdown):\n{"product_name":"exact full product name from packaging or URL","features":"key features, eco or natural ingredients, benefits — comma separated, max 25 words"}`}
      ]}]
    })
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return JSON.parse(d.choices[0].message.content.replace(/```json|```/g,"").trim());
}

async function generateStrategies(images,productName,desc,blogUrl,boards,oaiKey){
  const bl=boards.length?boards.map(b=>b.name).join(", "):"No boards loaded";
  const sl=STYLES.slice(0,pinCount).map((s,i)=>`Pin${i+1}: ${s.label}`).join("\n");
  const prompt=`Product: ${productName}\nFeatures: ${desc||"see images"}\nBlog post URL: ${blogUrl}\n\nAvailable Tailwind boards: ${bl}\n\nGenerate ${pinCount} Pinterest pin concepts. Return ONLY compact JSON (no markdown):\n{"pins":[{"style":"","overlay_text":"","title":"","description":"","board_name":"","alt_text":""}]}\n\nStyles in order:\n${sl}\n\nRules:\n- overlay_text: max 5 punchy words, ALL different angles (benefit/problem/feature/lifestyle/value/hook/eco/statement/curiosity/comparison)\n- title: max 100 chars, keyword-rich for Pinterest search\n- description: max 430 chars — Hook. 2-3 key eco features. Payoff. CTA like "Full review on the blog 🌿". End with: "Affiliate link — no extra cost to you 💚". New line then 8-10 hashtags. Do NOT include the blog URL in the text.\n- board_name: ONLY use board names that are genuinely relevant to this product. Pick from the boards list above. Boards can repeat across pins — never assign a pin to an irrelevant board just to vary. Only use boards that truly fit this product category.\n- alt_text: descriptive with product name and scene\n- Tone: warm, conversational, eco-conscious — Green & Glow Living, US women 25-45`;
  const imgContent=images.map(img=>({type:"image_url",image_url:{url:`data:${img.mime};base64,${img.b64}`,detail:"low"}}));
  const r=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+oaiKey},
    body:JSON.stringify({
      model:"gpt-4o-mini",max_tokens:2500,
      messages:[
        {role:"system",content:"You are a Pinterest marketing expert. Return ONLY valid compact JSON."},
        {role:"user",content:[...imgContent,{type:"text",text:prompt}]}
      ]
    })
  });
  const d=await r.json();
  if(d.error)throw new Error("OpenAI text: "+d.error.message);
  return d.choices[0].message.content.replace(/```json|```/g,"").trim();
}

async function genImage(images,pinIndex,scene,oaiKey){
  const fd=new FormData();
  fd.append("model","gpt-image-1");
  const primary=images[pinIndex%images.length];
  const others=images.filter((_,i)=>i!==pinIndex%images.length);
  fd.append("image[]",b64ToBlob(primary.b64,primary.mime),"product_main."+(primary.mime.split("/")[1]||"jpg"));
  others.forEach((img,i)=>fd.append("image[]",b64ToBlob(img.b64,img.mime),`product_ref${i+1}.`+(img.mime.split("/")[1]||"jpg")));
  fd.append("prompt",`Product photography Pinterest pin. Scene: ${scene}. The exact product from the reference images must be prominently featured with its packaging and branding clearly visible. Portrait orientation 1024x1536. Professional photography. No text, words, or letters anywhere in the image.`);
  fd.append("quality","medium");fd.append("size","1024x1536");fd.append("n","1");
  const r=await fetch("https://api.openai.com/v1/images/edits",{method:"POST",headers:{Authorization:"Bearer "+oaiKey},body:fd});
  const d=await r.json();
  if(d.error)throw new Error("OpenAI image: "+d.error.message);
  return d.data[0].b64_json;
}

async function uploadImgBB(b64,key){
  const fd=new FormData();fd.append("key",key);fd.append("image",b64);
  const r=await fetch("https://api.imgbb.com/1/upload",{method:"POST",body:fd});
  const d=await r.json();
  if(!d.success)throw new Error("ImgBB: "+(d.error?.message||"upload failed"));
  return d.data.url;
}

async function verifyTailwind(key){
  const r=await fetch("https://api-v1.tailwind.ai/v1/accounts",{headers:{Authorization:"Bearer "+key}});
  if(!r.ok)throw new Error("Tailwind key invalid");
  const d=await r.json();
  if(!d.data?.accounts?.length)throw new Error("No Pinterest accounts found in Tailwind");
  return d.data.accounts[0];
}
async function getBoards(aid,key){
  const r=await fetch(`https://api-v1.tailwind.ai/v1/accounts/${aid}/boards`,{headers:{Authorization:"Bearer "+key}});
  const d=await r.json();
  return(d.data?.boards||[]).filter(b=>!b.isSecret);
}
async function twPost(aid,key,{mediaUrl,title,description,url,boardId,altText}){
  const r=await fetch(`https://api-v1.tailwind.ai/v1/accounts/${aid}/posts`,{
    method:"POST",
    headers:{Authorization:"Bearer "+key,"Content-Type":"application/json"},
    body:JSON.stringify({mediaUrl,title,description,url,boardId,altText})
  });
  const d=await r.json();
  if(!d.data?.post)throw new Error("Tailwind: "+(d.error?.message||"failed"));
  return d.data.post.id;
}
async function twDel(aid,pid,key){
  await fetch(`https://api-v1.tailwind.ai/v1/accounts/${aid}/posts/${pid}`,{method:"DELETE",headers:{Authorization:"Bearer "+key}});
}

// ── Canvas with branding ─────────────────────────────────────────────────────

async function composite(rawB64,overlayText){
  // Ensure Fraunces font is loaded before canvas use
  try{await document.fonts.load('700 32px "Fraunces"');}catch(e){}

  return new Promise(resolve=>{
    const canvas=document.createElement("canvas");
    canvas.width=1024;canvas.height=1536;
    const ctx=canvas.getContext("2d"),img=new Image();
    img.onload=()=>{
      ctx.drawImage(img,0,0,1024,1536);

      // ── Gradients ──
      const g1=ctx.createLinearGradient(0,970,0,1536);
      g1.addColorStop(0,"rgba(0,0,0,0)");g1.addColorStop(1,"rgba(10,22,12,0.92)");
      ctx.fillStyle=g1;ctx.fillRect(0,970,1024,566);
      const g2=ctx.createLinearGradient(0,0,0,130);
      g2.addColorStop(0,"rgba(0,0,0,0.30)");g2.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=g2;ctx.fillRect(0,0,1024,130);

      // ── Gold accent line ──
      ctx.strokeStyle=GOLD;ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(130,1268);ctx.lineTo(894,1268);ctx.stroke();

      // ── Overlay text ──
      const up=overlayText.toUpperCase(),ws=up.split(" ");
      const lines=ws.length<=2?[up]:ws.length===3?[ws.slice(0,2).join(" "),ws[2]]:[ws.slice(0,Math.ceil(ws.length/2)).join(" "),ws.slice(Math.ceil(ws.length/2)).join(" ")];
      const fs=up.length>22?70:up.length>14?84:96;
      ctx.font=`bold ${fs}px Georgia,serif`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.shadowColor="rgba(0,0,0,0.65)";ctx.shadowBlur=26;ctx.shadowOffsetY=3;
      ctx.fillStyle="#fff";
      const lh=fs*1.25,sy=1375-(lines.length*lh)/2;
      lines.forEach((l,i)=>ctx.fillText(l,512,sy+i*lh));

      // ── Branding: detect brightness at bottom band ──
      // Sample the image BEFORE gradient (use raw pixel data around y=1460)
      // Since gradient is already applied, sample near the center of bottom area
      const sample=ctx.getImageData(200,1460,624,30);
      let brightness=0;
      for(let i=0;i<sample.data.length;i+=4){
        brightness+=0.299*sample.data[i]+0.587*sample.data[i+1]+0.114*sample.data[i+2];
      }
      brightness/=(sample.data.length/4);

      // Bottom area is almost always dark due to gradient — use white unless very light
      const brandColor=brightness>160?"#1B4D2E":"#FFFFFF";
      const subColor=brightness>160?"rgba(27,77,46,0.7)":"rgba(255,255,255,0.65)";

      // ── "Green & Glow Living" in Fraunces ──
      ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      ctx.textAlign="center";ctx.textBaseline="middle";

      // Check if Fraunces loaded, fall back to Georgia
      const frauncesFace=document.fonts.check('700 32px "Fraunces"');
      const brandFont=frauncesFace?'700 32px "Fraunces"':"700 30px Georgia, serif";

      ctx.font=brandFont;
      ctx.fillStyle=brandColor;
      ctx.fillText("Green & Glow Living",512,1487);

      // ── greenandglowliving.com ──
      ctx.font='16px "Lato", Arial, sans-serif';
      ctx.fillStyle=subColor;
      ctx.fillText("greenandglowliving.com",512,1515);

      // ── Small gold dot accent ──
      ctx.fillStyle=GOLD;
      ctx.beginPath();ctx.arc(512,1470,3,0,Math.PI*2);ctx.fill();

      resolve(canvas.toDataURL("image/jpeg",0.92));
    };
    img.src="data:image/png;base64,"+rawB64;
  });
}

// ── Small UI ─────────────────────────────────────────────────────────────────

function CopyBtn({text}){
  const[ok,setOk]=useState(false);
  return<button onClick={()=>{navigator.clipboard.writeText(text);setOk(true);setTimeout(()=>setOk(false),1500)}}
    style={{background:ok?G:"transparent",color:ok?"#fff":GOLD,border:`1.5px solid ${ok?G:GOLD}`,borderRadius:5,padding:"3px 12px",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .2s"}}>
    {ok?"✓ Copied":"Copy"}</button>;
}
function Field({label,value}){
  return<div style={{borderTop:"1px solid #EDF2EE",padding:"12px 18px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
      <span style={{fontSize:10,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.1em"}}>{label}</span>
      <CopyBtn text={value}/>
    </div>
    <div style={{fontSize:13,color:"#444",lineHeight:1.6,whiteSpace:"pre-wrap",fontFamily:"system-ui"}}>{value}</div>
  </div>;
}
function Sp({color="#fff",size=14}){
  return<div style={{width:size,height:size,border:`2px solid rgba(128,128,128,0.2)`,borderTopColor:color,borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block",flexShrink:0}}/>;
}
function Badge({status,error}){
  const m={done:["#E6F4EA","#1B5E20","✓ In Tailwind"],failed:["#FFEBEE","#B71C1C","✗ Failed"],generating:["#FFF8E1","#E65100","⚡ Generating"],uploading:["#F3E5F5","#4A148C","↑ Hosting"],pushing:["#E3F2FD","#0D47A1","↑ Tailwind"],pending:["#F5F5F5","#757575","—"]};
  const[bg,col,lbl]=m[status]||m.pending;
  return<div title={error||""} style={{background:bg,color:col,fontSize:9,fontWeight:700,padding:"2px 5px",borderRadius:4,textAlign:"center",marginTop:3,cursor:error?"help":"default"}}>{lbl}</div>;
}

// ── Main App ─────────────────────────────────────────────────────────────────

function App(){
  const[step,setStep]=useState("setup");
  const[oai,setOai]=useState(()=>localStorage.getItem("gg_oai")||"");
  const[tw,setTw]=useState(()=>localStorage.getItem("gg_tw")||"");
  const[ibb,setIbb]=useState(()=>localStorage.getItem("gg_ibb")||"");
  const[save,setSave]=useState(true);
  const[conn,setConn]=useState(false);
  const[connErr,setConnErr]=useState("");
  const[acc,setAcc]=useState(null);
  const[boards,setBoards]=useState([]);

  // Product inputs
  const[amazonUrl,setAmazonUrl]=useState("");
  const[images,setImages]=useState([]);
  const[detecting,setDetecting]=useState(false);
  const[name,setName]=useState("");
  const[desc,setDesc]=useState("");
  const[blogUrl,setBlogUrl]=useState("https://greenandglowliving.com/");
  const[pinCount,setPinCount]=useState(10);

  const[prog,setProg]=useState({msg:"",sub:"",pct:0});
  const[pins,setPins]=useState([]);
  const[active,setActive]=useState(0);
  const[err,setErr]=useState("");
  const[regen,setRegen]=useState(null);
  const[etxt,setEtxt]=useState("");
  const[ebusy,setEbusy]=useState(false);
  const fref=useRef(null);
  const detectRef=useRef(null);

  useEffect(()=>{if(pins[active])setEtxt(pins[active].overlay_text||"");},[active]);

  // Amazon URL handler — parse name immediately, trigger detect
  const onAmazonUrl=async(url)=>{
    setAmazonUrl(url);
    if(!url.includes("amazon."))return;
    // Instant name parse from URL
    const parsed=parseAmazonName(url);
    if(parsed&&!name)setName(parsed);
    // If we have images, re-detect with URL context
    if(images.length&&oai){
      clearTimeout(detectRef.current);
      detectRef.current=setTimeout(()=>runDetect(images,url),800);
    }
  };

  const runDetect=async(imgs,url)=>{
    if(!oai||!imgs.length)return;
    setDetecting(true);
    try{
      const result=await autoDetect(imgs,url,oai);
      if(result.product_name)setName(result.product_name);
      if(result.features)setDesc(result.features);
    }catch(e){console.log("Auto-detect:",e.message);}
    finally{setDetecting(false);}
  };

  const addImages=async(files)=>{
    const toAdd=Array.from(files).slice(0,MAX_IMGS-images.length);
    const newImgs=await Promise.all(toAdd.map(f=>new Promise(res=>{
      const r=new FileReader();
      r.onload=ev=>res({b64:ev.target.result.split(",")[1],mime:f.type||"image/jpeg",preview:ev.target.result});
      r.readAsDataURL(f);
    })));
    const combined=[...images,...newImgs].slice(0,MAX_IMGS);
    setImages(combined);
    // Auto-detect on first image upload
    if(combined.length>=1){
      clearTimeout(detectRef.current);
      detectRef.current=setTimeout(()=>runDetect(combined,amazonUrl),500);
    }
  };

  const removeImage=(i)=>setImages(imgs=>imgs.filter((_,idx)=>idx!==i));

  const connect=async()=>{
    setConn(true);setConnErr("");
    try{
      if(save){localStorage.setItem("gg_oai",oai);localStorage.setItem("gg_tw",tw);localStorage.setItem("gg_ibb",ibb);}
      const a=await verifyTailwind(tw);
      const b=await getBoards(a.id,tw);
      setAcc(a);setBoards(b);setStep("input");
    }catch(e){setConnErr(e.message);}
    finally{setConn(false);}
  };

  const upd=(arr,i,p)=>{const n=[...arr];n[i]={...n[i],...p};return n;};

  const generate=async()=>{
    if(!images.length){setErr("Upload at least one product image.");return;}
    if(!name.trim()){setErr("Product name is required.");return;}
    if(!blogUrl.trim()||blogUrl==="https://greenandglowliving.com/"){setErr("Enter the specific blog post URL.");return;}
    setStep("generating");setErr("");
    try{
      setProg({msg:"Analyzing product with GPT-4o-mini...",sub:"Writing 10 pin strategies",pct:3});
      const raw=await generateStrategies(images,name,desc,blogUrl,boards,oai);
      let an;
      try{an=JSON.parse(raw);}
      catch{throw new Error("Could not parse strategies — please try again.");}
      const pl=(an.pins||[]).slice(0,pinCount);
      const init=pl.map((p,i)=>({...p,style:STYLES[i]?.label||p.style,rawB64:null,dataUrl:null,imgbbUrl:null,twId:null,status:"pending",error:null}));
      setPins(init);
      const work=[...init];
      for(let i=0;i<pl.length;i++){
        const p=pl[i],s=STYLES[i]||{label:p.style,scene:"clean product photography"};
        work[i]={...work[i],status:"generating"};setPins([...work]);
        setProg({msg:`Pin ${i+1}/${pinCount} — ${s.label}`,sub:`Generating with gpt-image-1 (using image ${(i%images.length)+1}/${images.length})...`,pct:4+i*(88/pinCount)});
        let rawB64;
        try{rawB64=await genImage(images,i,s.scene,oai);}
        catch(e){work[i]={...work[i],status:"failed",error:e.message};setPins([...work]);continue;}
        setProg({msg:`Pin ${i+1}/${pinCount} — ${s.label}`,sub:"Adding branding overlay...",pct:5+i*(88/pinCount)});
        const du=await composite(rawB64,p.overlay_text);
        work[i]={...work[i],rawB64,dataUrl:du,status:"uploading"};setPins([...work]);
        setProg({msg:`Pin ${i+1}/${pinCount} — ${s.label}`,sub:"Hosting on ImgBB...",pct:6+i*(88/pinCount)});
        let imgbbUrl;
        try{imgbbUrl=await uploadImgBB(du.split(",")[1],ibb);}
        catch(e){work[i]={...work[i],status:"failed",error:e.message};setPins([...work]);continue;}
        work[i]={...work[i],imgbbUrl,status:"pushing"};setPins([...work]);
        setProg({msg:`Pin ${i+1}/${pinCount} — ${s.label}`,sub:"Creating Tailwind draft...",pct:7+i*(88/pinCount)});
        try{
          const matchedBoard=matchBoard(p.board_name,boards);
          const tid=await twPost(acc.id,tw,{mediaUrl:imgbbUrl,title:p.title,description:p.description,url:blogUrl,boardId:matchedBoard?.id,altText:p.alt_text});
          work[i]={...work[i],twId:tid,status:"done"};
        }catch(e){work[i]={...work[i],status:"failed",error:e.message};}
        setPins([...work]);
      }
      setActive(0);setStep("results");
    }catch(e){setErr(e.message);setStep("input");}
  };

  const regenPin=async(idx)=>{
    if(regen!==null)return;setRegen(idx);
    const p=pins[idx];
    try{
      setPins(x=>upd(x,idx,{status:"generating",error:null}));
      const s=STYLES[idx]||{scene:"clean product photography"};
      const rawB64=await genImage(images,idx,s.scene,oai);
      setPins(x=>upd(x,idx,{status:"uploading"}));
      const du=await composite(rawB64,p.overlay_text);
      const imgbbUrl=await uploadImgBB(du.split(",")[1],ibb);
      setPins(x=>upd(x,idx,{status:"pushing"}));
      if(p.twId){try{await twDel(acc.id,p.twId,tw);}catch(e){}}
      const tid=await twPost(acc.id,tw,{mediaUrl:imgbbUrl,title:p.title,description:p.description,url:blogUrl,boardId:matchBoard(p.board_name,boards)?.id,altText:p.alt_text});
      setPins(x=>upd(x,idx,{rawB64,dataUrl:du,imgbbUrl,twId:tid,status:"done",error:null}));
    }catch(e){setPins(x=>upd(x,idx,{status:"failed",error:e.message}));}
    finally{setRegen(null);}
  };

  const applyEdit=async()=>{
    const p=pins[active];if(!p.rawB64||etxt===p.overlay_text)return;
    setEbusy(true);
    try{
      const du=await composite(p.rawB64,etxt);
      const imgbbUrl=await uploadImgBB(du.split(",")[1],ibb);
      if(p.twId){try{await twDel(acc.id,p.twId,tw);}catch(e){}}
      const tid=await twPost(acc.id,tw,{mediaUrl:imgbbUrl,title:p.title,description:p.description,url:blogUrl,boardId:matchBoard(p.board_name,boards)?.id,altText:p.alt_text});
      setPins(x=>upd(x,active,{overlay_text:etxt,dataUrl:du,imgbbUrl,twId:tid,status:"done"}));
    }catch(e){alert("Error: "+e.message);}
    finally{setEbusy(false);}
  };

  const dl=(p,i)=>{if(!p.dataUrl)return;const a=document.createElement("a");a.href=p.dataUrl;a.download=`green-glow-pin-${i+1}.jpg`;a.click();};

  const inp={width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid #C7D9CA",background:"#fff",fontSize:14,color:DARK,outline:"none",boxSizing:"border-box",fontFamily:"'Lato',system-ui"};
  const lbl={display:"block",fontSize:11,fontWeight:700,color:G,marginBottom:5,letterSpacing:"0.08em",textTransform:"uppercase"};
  const PB={background:G,color:"#fff",border:"none",borderRadius:8,padding:"13px 22px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",fontFamily:"'Lato',sans-serif"};
  const done=pins.filter(p=>p.status==="done").length;
  const fail=pins.filter(p=>p.status==="failed").length;

  return(
    <div style={{minHeight:"100vh",background:CREAM}}>
      {/* Header */}
      <div style={{background:G,padding:"14px 22px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🌿</div>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:16,fontFamily:"'Fraunces','Playfair Display',Georgia,serif"}}>Green &amp; Glow Pin Generator</div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase"}}>GPT-4o-mini · gpt-image-1 · ImgBB · Tailwind</div>
        </div>
        {step==="results"&&(
          <div style={{marginLeft:"auto",display:"flex",gap:8}}>
            {done>0&&<div style={{background:"#E6F4EA",color:"#1B5E20",fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:20}}>✓ {done} in Tailwind</div>}
            {fail>0&&<div style={{background:"#FFEBEE",color:"#B71C1C",fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:20}}>✗ {fail} failed</div>}
          </div>
        )}
      </div>

      <div style={{maxWidth:660,margin:"0 auto",padding:"26px 18px 60px"}}>

        {/* SETUP */}
        {step==="setup"&&(
          <div style={{animation:"fadeIn .3s ease"}}>
            <h1 style={{fontFamily:"'Fraunces','Playfair Display',Georgia,serif",color:G,fontSize:24,margin:"0 0 6px"}}>Full pipeline. One click.</h1>
            <p style={{color:MUTED,fontSize:14,lineHeight:1.75,margin:"0 0 18px"}}>Paste Amazon URL + upload images → product auto-detected → gpt-image-1 generates 10 styled pins → branded with Green &amp; Glow Living → pushed to Tailwind.</p>
            <div style={{background:"#fff5e0",border:`1px solid ${GOLD}55`,borderRadius:10,padding:"12px 16px",marginBottom:18,fontSize:13,color:"#7a5a00",lineHeight:1.6}}>
              ⚠️ <strong>One-time setup:</strong> Complete <strong>API Organisation Verification</strong> at platform.openai.com → Settings → Organisation Verification. Required for gpt-image-1.
            </div>
            {connErr&&<div style={{background:"#FFF3F3",border:"1px solid #FFB8B8",borderRadius:8,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#C00"}}>⚠️ {connErr}</div>}
            <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:14,border:"1px solid #E0EBE2"}}>
              <div style={{fontSize:12,color:MUTED,marginBottom:16,padding:"10px 14px",background:"#F6FAF7",borderRadius:8,borderLeft:`3px solid ${GOLD}`}}>
                💡 <strong style={{color:DARK}}>Cost per product:</strong> ~$0.42 (10 × gpt-image-1 medium) + GPT-4o-mini ~$0.001 + ImgBB free
              </div>
              {[["OpenAI API Key","sk-proj-... (text + image generation)",oai,setOai],["Tailwind API Key","Tailwind → Settings → Integrations → Tailwind API",tw,setTw],["ImgBB API Key","imgbb.com → free account → API key",ibb,setIbb]].map(([l,ph,v,s])=>(
                <div key={l} style={{marginBottom:14}}>
                  <label style={lbl}>{l}</label>
                  <input type="password" placeholder={ph} value={v} onChange={e=>s(e.target.value)} style={inp}/>
                </div>
              ))}
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                <input type="checkbox" id="sv" checked={save} onChange={e=>setSave(e.target.checked)} style={{width:14,height:14,cursor:"pointer"}}/>
                <label htmlFor="sv" style={{fontSize:12,color:MUTED,cursor:"pointer"}}>Remember keys in this browser (saved locally only)</label>
              </div>
            </div>
            <button onClick={connect} disabled={conn||!oai||!tw||!ibb}
              style={{...PB,opacity:(!oai||!tw||!ibb)?0.45:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {conn?<><Sp/> Connecting to Tailwind...</>:"Connect & Continue →"}
            </button>
          </div>
        )}

        {/* INPUT */}
        {step==="input"&&(
          <div style={{animation:"fadeIn .3s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <button onClick={()=>setStep("setup")} style={{background:"none",border:"1px solid #C7D9CA",color:G,borderRadius:6,padding:"5px 12px",fontSize:13,cursor:"pointer"}}>← Back</button>
              <h2 style={{fontFamily:"'Fraunces','Playfair Display',Georgia,serif",color:G,margin:0,fontSize:20}}>Product details</h2>
              {acc&&<div style={{marginLeft:"auto",fontSize:12,color:MUTED}}>📌 {boards.length} boards · {acc.displayName}</div>}
            </div>
            {err&&<div style={{background:"#FFF3F3",border:"1px solid #FFB8B8",borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#C00"}}>⚠️ {err}</div>}

            {/* Amazon URL — first field */}
            <div style={{marginBottom:16}}>
              <label style={lbl}>Amazon / Affiliate URL <span style={{color:MUTED,fontWeight:400,textTransform:"none",fontSize:10}}>(paste here — product name auto-detected)</span></label>
              <input
                value={amazonUrl}
                onChange={e=>onAmazonUrl(e.target.value)}
                placeholder="https://www.amazon.com/Product-Name/dp/ASIN?tag=greenandglow-20"
                style={inp}
              />
              {amazonUrl&&!amazonUrl.includes("tag="+AFF_TAG)&&(
                <div style={{fontSize:11,color:GOLD,marginTop:4}}>
                  ⚠️ Affiliate tag missing —{" "}
                  <button onClick={()=>setAmazonUrl(ensureAffTag(amazonUrl))}
                    style={{background:"none",border:"none",color:G,fontSize:11,cursor:"pointer",fontWeight:700,textDecoration:"underline",padding:0}}>
                    Add tag automatically
                  </button>
                </div>
              )}
              {amazonUrl&&amazonUrl.includes("tag="+AFF_TAG)&&(
                <div style={{fontSize:11,color:G,marginTop:4}}>✓ Affiliate tag present</div>
              )}
            </div>

            {/* Product images */}
            <div style={{marginBottom:16}}>
              <label style={lbl}>Product Images * <span style={{color:MUTED,fontWeight:400,textTransform:"none",fontSize:10}}>Up to {MAX_IMGS} · more = more variety</span></label>
              {images.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:10}}>
                  {images.map((img,i)=>(
                    <div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",border:`2px solid ${G}33`}}>
                      <img src={img.preview} alt="" style={{width:"100%",aspectRatio:"1",objectFit:"contain",background:"#fff",display:"block"}}/>
                      <button onClick={()=>removeImage(i)}
                        style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(27,77,46,0.8)",color:"#fff",fontSize:9,fontWeight:700,textAlign:"center",padding:"2px 0"}}>IMG {i+1}</div>
                    </div>
                  ))}
                  {images.length<MAX_IMGS&&(
                    <div onClick={()=>fref.current.click()}
                      style={{aspectRatio:"1",border:"2px dashed #C7D9CA",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"#fff",gap:4}}>
                      <div style={{fontSize:24,color:MUTED}}>+</div>
                      <div style={{fontSize:10,color:MUTED}}>Add image</div>
                    </div>
                  )}
                </div>
              )}
              {images.length===0&&(
                <div onClick={()=>fref.current.click()}
                  style={{border:"2px dashed #C7D9CA",borderRadius:10,background:"#fff",cursor:"pointer",padding:26,textAlign:"center"}}>
                  <div style={{fontSize:26,marginBottom:5}}>📷</div>
                  <div style={{color:G,fontWeight:700,fontSize:13}}>Click to upload product images</div>
                  <div style={{color:MUTED,fontSize:11,marginTop:3}}>Up to 4 · JPG or PNG · Auto-detects product name &amp; features ✨</div>
                </div>
              )}
              <input ref={fref} type="file" accept="image/*" multiple onChange={e=>addImages(e.target.files)} style={{display:"none"}}/>
            </div>

            {/* Auto-detect status */}
            {detecting&&(
              <div style={{background:"#F6FAF7",border:`1px solid ${G}33`,borderRadius:8,padding:"9px 14px",marginBottom:12,fontSize:12,color:G,display:"flex",alignItems:"center",gap:8}}>
                <Sp color={G} size={13}/> Auto-detecting product details from image{amazonUrl?" + URL":""}...
              </div>
            )}

            <div style={{marginBottom:13}}>
              <label style={lbl}>Product Name *{detecting&&<span style={{color:GOLD,fontWeight:400,textTransform:"none",fontSize:10,marginLeft:6,animation:"pulse 1s infinite"}}>detecting...</span>}</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="Auto-filled — edit if needed" style={inp}/>
            </div>

            <div style={{marginBottom:13}}>
              <label style={lbl}>Key Features / Eco Angle{detecting&&<span style={{color:GOLD,fontWeight:400,textTransform:"none",fontSize:10,marginLeft:6,animation:"pulse 1s infinite"}}>detecting...</span>}</label>
              <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Auto-filled — add eco angle or edit" rows={3} style={inp}/>
            </div>

            <div style={{marginBottom:10}}>
              <label style={lbl}>Blog Post URL * <span style={{color:MUTED,fontWeight:400,textTransform:"none",fontSize:10}}>(pin destination — readers click through to here)</span></label>
              <input value={blogUrl} onChange={e=>setBlogUrl(e.target.value)} placeholder="https://greenandglowliving.com/your-post-slug/" style={inp}/>
            </div>

            <div style={{marginBottom:24,background:"#F6FAF7",borderRadius:8,padding:"9px 14px",fontSize:12,color:MUTED,borderLeft:`3px solid ${G}33`}}>
              🌿 Every pin will be branded with <strong style={{color:G,fontFamily:"'Fraunces',serif"}}>Green &amp; Glow Living</strong> + greenandglowliving.com · Affiliate disclosure auto-added to all descriptions
            </div>

            <div style={{marginBottom:20}}>
              <label style={lbl}>How many pins?</label>
              <div style={{display:"flex",gap:10}}>
                {[1,5,10].map(n=>(
                  <button key={n} onClick={()=>setPinCount(n)}
                    style={{flex:1,padding:"11px 8px",borderRadius:8,border:`2px solid ${pinCount===n?G:"#C7D9CA"}`,background:pinCount===n?G:"#fff",color:pinCount===n?"#fff":G,fontWeight:700,fontSize:15,cursor:"pointer",transition:"all .2s",fontFamily:"'Lato',sans-serif"}}>
                    {n} {n===1?"pin":n===5?"pins — $0.21":"pins — $0.42"}
                  </button>
                ))}
              </div>
              <div style={{fontSize:11,color:MUTED,marginTop:5}}>
                {pinCount===1?"Single pin · ~$0.04 · ~30 seconds":pinCount===5?"5 pins · ~$0.21 · ~2–3 minutes":"10 pins · ~$0.42 · ~4–6 minutes"}
              </div>
            </div>

            <button onClick={generate} style={PB}>✨ Generate {pinCount} Branded Pin{pinCount>1?"s":""} + Push to Tailwind</button>
            <div style={{fontSize:11,color:MUTED,textAlign:"center",marginTop:8}}>
              4–6 minutes · {images.length} image{images.length!==1?"s":""} → {images.length>1?"more variety across pins":"add more images for variety"}
            </div>
          </div>
        )}

        {/* GENERATING */}
        {step==="generating"&&(
          <div style={{textAlign:"center",padding:"40px 10px",animation:"fadeIn .3s ease"}}>
            <div style={{fontSize:48,marginBottom:16}}>🌿</div>
            <h2 style={{fontFamily:"'Fraunces','Playfair Display',Georgia,serif",color:G,margin:"0 0 4px",fontSize:21}}>Building your {pinCount} branded pin{pinCount>1?"s":""}...</h2>
            <p style={{color:MUTED,fontSize:14,margin:"0 0 4px"}}>{prog.msg}</p>
            <p style={{color:"#aaa",fontSize:12,margin:"0 0 20px"}}>{prog.sub}</p>
            <div style={{background:"#D8E8DC",borderRadius:100,height:10,overflow:"hidden",marginBottom:6}}>
              <div style={{height:"100%",width:`${prog.pct}%`,background:`linear-gradient(90deg,${G},${GOLD})`,borderRadius:100,transition:"width .6s ease"}}/>
            </div>
            <div style={{fontSize:12,color:"#aaa",marginBottom:28}}>{Math.round(prog.pct)}%</div>
            {pins.length>0&&(
              <div style={{background:"#fff",borderRadius:10,padding:16,border:"1px solid #E0EBE2",textAlign:"left"}}>
                <div style={{fontSize:10,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Live status</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px"}}>
                  {pins.map((p,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:11}}>
                      <div style={{width:18,height:18,borderRadius:"50%",background:p.status==="done"?G:p.status==="failed"?"#FFEBEE":"#EDF2EE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:p.status==="done"?"#fff":p.status==="failed"?"#C00":"#bbb",flexShrink:0}}>
                        {p.status==="done"?"✓":p.status==="failed"?"✗":p.status!=="pending"?<Sp color={G} size={10}/>:i+1}
                      </div>
                      <span style={{color:p.status==="done"?G:p.status==="failed"?"#C00":p.status!=="pending"?DARK:"#bbb",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.style||STYLES[i]?.label}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* RESULTS */}
        {step==="results"&&pins.length>0&&(
          <div style={{animation:"fadeIn .3s ease"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <h2 style={{fontFamily:"'Fraunces','Playfair Display',Georgia,serif",color:G,margin:0,fontSize:20}}>
                {done===pinCount?`All ${pinCount} pin${pinCount>1?"s":""} in Tailwind 🎉`:`${done}/${pinCount} in Tailwind`}
              </h2>
              <button onClick={()=>{setPins([]);setImages([]);setName("");setDesc("");setAmazonUrl("");setBlogUrl("https://greenandglowliving.com/");setErr("");setStep("input");}}
                style={{background:"none",border:`1.5px solid ${G}`,color:G,borderRadius:7,padding:"6px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}>
                + New Product
              </button>
            </div>
            {fail>0&&<div style={{background:"#FFF3F3",border:"1px solid #FFB8B8",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#C00"}}>
              ⚠️ {fail} pin{fail>1?"s":""} failed. Hover the badge for details. Use ↺ Redo to retry.
            </div>}

            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(pinCount,5)},1fr)`,gap:7,marginBottom:20}}>
              {pins.map((p,i)=>(
                <div key={i}>
                  <div onClick={()=>setActive(i)} style={{cursor:"pointer",borderRadius:7,overflow:"hidden",border:`2.5px solid ${active===i?GOLD:"transparent"}`,position:"relative",transition:"border .2s"}}>
                    {p.dataUrl?<img src={p.dataUrl} alt="" style={{width:"100%",display:"block"}}/>
                      :<div style={{paddingBottom:"150%",background:"#EDF2EE",position:"relative"}}>
                        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {p.status!=="pending"&&p.status!=="failed"?<Sp color={G} size={22}/>
                            :<div style={{fontSize:20,color:p.status==="failed"?"#C00":"#bbb"}}>{p.status==="failed"?"✗":i+1}</div>}
                        </div>
                      </div>}
                    {regen===i&&<div style={{position:"absolute",inset:0,background:"rgba(27,77,46,0.75)",display:"flex",alignItems:"center",justifyContent:"center"}}><Sp/></div>}
                    <div style={{position:"absolute",top:3,left:3,background:active===i?GOLD:"rgba(0,0,0,0.5)",color:"#fff",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3}}>{i+1}</div>
                  </div>
                  <Badge status={p.status} error={p.error}/>
                  <button onClick={()=>regenPin(i)} disabled={regen!==null}
                    style={{width:"100%",marginTop:3,padding:"4px 0",background:regen===i?G:"#fff",color:regen===i?"#fff":MUTED,border:`1px solid ${regen===i?G:"#C7D9CA"}`,borderRadius:5,fontSize:10,cursor:regen!==null?"not-allowed":"pointer",fontWeight:600,opacity:regen!==null&&regen!==i?0.35:1}}>
                    {regen===i?"Regenerating...":"↺ Redo"}
                  </button>
                </div>
              ))}
            </div>

            {pins[active]&&(
              <div style={{background:"#fff",borderRadius:12,border:"1px solid #E0EBE2",overflow:"hidden"}}>
                <div style={{display:"flex"}}>
                  <div style={{width:134,flexShrink:0}}>
                    {pins[active].dataUrl?<img src={pins[active].dataUrl} style={{width:"100%",display:"block"}} alt=""/>:<div style={{paddingBottom:"150%",background:"#EDF2EE"}}/>}
                  </div>
                  <div style={{flex:1,padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Pin {active+1} · {pins[active].style}</div>
                      <Badge status={pins[active].status} error={pins[active].error}/>
                      {pins[active].error&&<div style={{fontSize:11,color:"#C00",marginTop:4,lineHeight:1.4}}>{pins[active].error}</div>}
                    </div>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Overlay Text</div>
                      <input value={etxt} onChange={e=>setEtxt(e.target.value)} maxLength={30} style={{...inp,fontSize:15,fontWeight:700,padding:"7px 10px"}}/>
                      <button onClick={applyEdit} disabled={ebusy||etxt===pins[active].overlay_text||!pins[active].rawB64}
                        style={{marginTop:6,background:etxt!==pins[active].overlay_text&&pins[active].rawB64?GOLD:"#E0EBE2",color:etxt!==pins[active].overlay_text&&pins[active].rawB64?"#fff":MUTED,border:"none",borderRadius:6,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        {ebusy?<><Sp color={GOLD} size={12}/> Applying...</>:"Apply Text + Update Tailwind"}
                      </button>
                    </div>
                    <div style={{marginTop:"auto"}}>
                      <div style={{fontSize:10,fontWeight:700,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Board</div>
                      <div style={{fontSize:12,color:"#555",marginBottom:10}}>{pins[active].board_name}</div>
                      <div style={{display:"flex",gap:7}}>
                        <button onClick={()=>dl(pins[active],active)} style={{flex:2,background:GOLD,color:"#fff",border:"none",borderRadius:7,padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"}}>⬇ Download</button>
                        <button onClick={()=>regenPin(active)} disabled={regen!==null} style={{flex:1,background:"transparent",color:G,border:`1.5px solid ${G}`,borderRadius:7,padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"}}>↺ Redo</button>
                      </div>
                    </div>
                  </div>
                </div>
                <Field label="Pinterest Title" value={pins[active].title||""}/>
                <Field label="Description" value={pins[active].description||""}/>
                <Field label="Alt Text" value={pins[active].alt_text||""}/>
                <div style={{borderTop:"1px solid #EDF2EE",padding:"12px 18px",background:"#FAFCFA"}}>
                  <div style={{fontSize:10,color:MUTED,marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Download all {pinCount}</div>
                  <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(pinCount,5)},1fr)`,gap:5,marginBottom:pinCount>5?5:0}}>
                    {pins.slice(0,Math.min(pinCount,5)).map((p,i)=><button key={i} onClick={()=>dl(p,i)} disabled={!p.dataUrl} style={{background:active===i?G:"#EDF2EE",color:active===i?"#fff":G,border:"none",borderRadius:5,padding:"7px 2px",fontSize:11,cursor:p.dataUrl?"pointer":"not-allowed",fontWeight:700,opacity:p.dataUrl?1:0.4}}>{i+1}</button>)}
                  </div>
                  {pinCount>5&&(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}}>
                    {pins.slice(5,pinCount).map((p,i)=><button key={i+5} onClick={()=>dl(p,i+5)} disabled={!p.dataUrl} style={{background:active===i+5?G:"#EDF2EE",color:active===i+5?"#fff":G,border:"none",borderRadius:5,padding:"7px 2px",fontSize:11,cursor:p.dataUrl?"pointer":"not-allowed",fontWeight:700,opacity:p.dataUrl?1:0.4}}>{i+6}</button>)}
                  </div>
                  )}
                </div>
              </div>
            )}
            <div style={{background:`${G}12`,border:`1px solid ${G}33`,borderRadius:10,padding:"12px 16px",marginTop:14,fontSize:12,color:G,lineHeight:1.75}}>
              <strong>Next:</strong> Tailwind → Drafts → review → schedule to SmartQueue. Pin 1 as new post, pins 2–10 as repins over coming weeks.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
